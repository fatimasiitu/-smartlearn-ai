<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Onboarding — SmartLearn AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="onboarding.css" />
</head>
<body>

<div class="onboarding-page">

  <div class="onboarding-card">

    <!-- HEADER -->
    <div class="onboarding-header">
      <div class="brand">
        <img src="assets/logo.png" alt="SmartLearn AI" />
        <span>SmartLearn AI</span>
      </div>

      <div class="progress">
        <span class="step-text">Step 1 of 4</span>
        <div class="progress-bar">
          <div class="progress-fill" style="width:25%"></div>
        </div>
      </div>

      <h1>Let’s personalize your learning experience</h1>

      <p class="description">
        Answer a few quick questions so SmartLearn AI<br />
        can adapt the course to you.
      </p>

      <div class="illustration">
        <img src="assets/onboarding-book.png" alt="Learning illustration" />
      </div>

      <button class="btn-primary">
        <a href="step-2.html" class="btn-primary">
  Start
</a>
      </button>

      <a href="dashboard.html" class="skip">
        Skip for now
      </a>

  </div>

</div>
