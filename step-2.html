<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartLearn AI — Step 2</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="step-2.css">
</head>

<body>
  <div class="onboarding-wrapper">
    <div class="onboarding-card">

      <!-- HEADER -->
      <header class="onboarding-header">
        <div class="brand">
          <img src="assets/logo.png" alt="SmartLearn AI">
          <span>SmartLearn AI</span>
        </div>

        <div class="progress">
          <span>Step 2 of 4</span>
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
        </div>
      </header>

      <!-- CONTENT -->
      <main class="onboarding-content">
        <h1>What is your main goal?</h1>
        <p class="subtitle">
          You can choose one option that best describes you.
        </p>

        <div class="options-grid">

          <!-- Learning & Education -->
          <div class="option-card active">
            <div class="option-icon">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
    <!-- книга -->
    <rect
      x="3"
      y="4"
      width="14"
      height="16"
      rx="3"
      fill="#EAF0FF"
      stroke="#4F6EF7"
      stroke-width="1.8"
    />
    <line
      x1="7"
      y1="8"
      x2="13"
      y2="8"
      stroke="#4F6EF7"
      stroke-width="1.6"
      stroke-linecap="round"
    />
    <line
      x1="7"
      y1="12"
      x2="13"
      y2="12"
      stroke="#4F6EF7"
      stroke-width="1.6"
      stroke-linecap="round"
    />

    <!-- чек -->
    <circle cx="17.5" cy="16.5" r="3.5" fill="#4F6EF7"/>
    <path
      d="M16.2 16.5l0.9 0.9 1.7-1.9"
      stroke="#fff"
      stroke-width="1.6"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </svg>
</div>
            <span>Learning & education</span>
            <div class="checkmark">✓</div>
          </div>

          <!-- Work & Career -->
          <div class="option-card">
            <div class="option-icon">
              <svg viewBox="0 0 24 24" fill="none">
  <rect x="3" y="7" width="18" height="12" rx="3" fill="#EAF0FF"/>
  <path
    d="M9 7V5H15V7"
    stroke="#4F6EF7"
    stroke-width="2"
    stroke-linecap="round"
  />
</svg>
            </div>
            <span>Work & career</span>
            <div class="checkmark">✓</div>
          </div>

          <!-- Personal Projects -->
          <div class="option-card">
            <div class="option-icon">
              <svg viewBox="0 0 24 24" fill="none">
  <path
    d="M12 2L16 10L12 14L8 10L12 2Z"
    fill="#EAF0FF"
  />
  <path
    d="M12 14V22"
    stroke="#4F6EF7"
    stroke-width="2"
    stroke-linecap="round"
  />
</svg>
            </div>
            <span>Personal projects</span>
            <div class="checkmark">✓</div>
          </div>

          <!-- Just Exploring -->
          <div class="option-card">
            <div class="option-icon">
              <svg viewBox="0 0 24 24" fill="none">
  <circle cx="11" cy="11" r="6" fill="#EAF0FF"/>
  <path
    d="M20 20L16 16"
    stroke="#4F6EF7"
    stroke-width="2"
    stroke-linecap="round"
  />
</svg>
            </div>
            <span>Just exploring</span>
            <div class="checkmark">✓</div>
          </div>

        </div>

        <button class="btn-primary"> <a href="step-3.html" class="btn-primary">Continue
</a></button>


      </main>

    </div>
  </div>

  <script src="step-2.js"></script>
</body>
</html>
