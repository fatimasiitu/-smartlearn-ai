<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartLearn AI — Step 3</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="step-3.css">
</head>

<body>
  <div class="onboarding-wrapper">
    <div class="onboarding-card">

      <!-- HEADER -->
      <header class="onboarding-header">
        <div class="brand">
          <img src="assets/logo.png" alt="SmartLearn AI">
          <span>SmartLearn AI</span>
        </div>

        <div class="progress">
          <span>Step 3 of 4</span>
          <div class="progress-bar">
            <div class="progress-fill" style="width:75%"></div>
          </div>
        </div>
      </header>

      <!-- CONTENT -->
      <main class="onboarding-content">
        <h1>How do you prefer explanations?</h1>
        <p class="subtitle">
          Select the style that best matches your learning preference.
        </p>

        <div class="options-grid">

          <!-- Short -->
          <button class="option-card active" data-value="short">
            <div class="option-icon">
              <!-- book -->
              <svg viewBox="0 0 24 24" fill="none">
                <rect x="4" y="3" width="14" height="18" rx="3"
                  fill="#EEF3FF" stroke="#4F6EF7" stroke-width="1.8"/>
                <line x1="8" y1="8" x2="14" y2="8"
                  stroke="#4F6EF7" stroke-width="1.6" stroke-linecap="round"/>
                <line x1="8" y1="12" x2="14" y2="12"
                  stroke="#4F6EF7" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </div>

            <div class="option-text">
              <strong>Short and simple</strong>
              <span>I’m just getting started</span>
            </div>

            <div class="checkmark">✓</div>
          </button>

          <!-- Detailed -->
          <button class="option-card" data-value="detailed">
            <div class="option-icon">
              <!-- laptop -->
              <svg viewBox="0 0 24 24" fill="none">
                <rect x="3" y="5" width="18" height="11" rx="2"
                  fill="#EEF3FF" stroke="#4F6EF7" stroke-width="1.8"/>
                <line x1="8" y1="19" x2="16" y2="19"
                  stroke="#4F6EF7" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </div>

            <div class="option-text">
              <strong>Detailed and in depth</strong>
              <span>I’ve used AI before</span>
            </div>

            <div class="checkmark">✓</div>
          </button>

          <!-- Balanced -->
          <button class="option-card" data-value="balanced">
            <div class="option-icon">
              <!-- balance -->
              <svg viewBox="0 0 24 24" fill="none">
                <line x1="12" y1="4" x2="12" y2="18"
                  stroke="#4F6EF7" stroke-width="1.8"/>
                <line x1="6" y1="8" x2="18" y2="8"
                  stroke="#4F6EF7" stroke-width="1.8"/>
                <circle cx="7" cy="12" r="3"
                  fill="#EEF3FF" stroke="#4F6EF7" stroke-width="1.6"/>
                <circle cx="17" cy="12" r="3"
                  fill="#EEF3FF" stroke="#4F6EF7" stroke-width="1.6"/>
              </svg>
            </div>

            <div class="option-text">
              <strong>Balanced</strong>
              <span>I use AI regularly</span>
            </div>

            <div class="checkmark">✓</div>
          </button>

        </div>

        <button class="btn-primary"><a href="step-4.html" class="btn-primary">Continue
</a></button>
        <a href="dashboard.html" class="btn-skip">
        Skip for now
      </a>
      </main>

    </div>
  </div>

  <script src="step-3.js"></script>
</body>
</html>
